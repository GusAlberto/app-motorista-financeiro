<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — App Motorista</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card { max-width: 24rem; }
    .icon {
      width: 72px; height: 72px; margin: 0 auto 1.5rem;
      background: #2563eb; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #a3a3a3; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #2563eb; color: #fff; border: none;
      padding: 0.75rem 1.5rem; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Não foi possível conectar. Verifique sua internet — seus dados salvos continuam seguros e sincronizam quando você voltar online.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
